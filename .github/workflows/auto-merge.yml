name: Auto-merge COC sync PRs

on:
  pull_request:
    types: [labeled, opened]

jobs:
  auto-merge:
    # Auto-merge PRs labeled 'coc-sync' (from BUILD repo cascade)
    if: |
      github.event.label.name == 'coc-sync' ||
      (github.event.action == 'opened' && contains(github.event.pull_request.labels.*.name, 'coc-sync'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Enable auto-merge
        run: gh pr merge ${{ github.event.pull_request.number }} --auto --squash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
